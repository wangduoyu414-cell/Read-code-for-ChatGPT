<svg width="920" height="520" viewBox="0 0 920 520" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Add read code to ChatGPT</title>
  <desc id="desc">A ChatGPT connector dialog showing the read code app being connected.</desc>
  <defs>
    <linearGradient id="hero" x1="76" y1="80" x2="790" y2="250" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFD18D"/>
      <stop offset="0.25" stop-color="#168BE9"/>
      <stop offset="0.63" stop-color="#41BFF3"/>
      <stop offset="1" stop-color="#B8F0FF"/>
    </linearGradient>
    <filter id="shadow" x="60" y="62" width="800" height="390" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#111827" flood-opacity="0.18"/>
    </filter>
    <filter id="blur">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
  </defs>
  <rect width="920" height="520" fill="#F5F5F5"/>
  <g opacity="0.35" filter="url(#blur)">
    <rect x="18" y="24" width="190" height="460" fill="#ECECEC"/>
    <rect x="244" y="48" width="520" height="32" rx="16" fill="#D9D9D9"/>
    <rect x="92" y="82" width="712" height="382" rx="14" fill="#FFFFFF"/>
    <rect x="706" y="66" width="66" height="34" rx="17" fill="#B7B7B7"/>
    <g fill="#B5B5B5">
      <circle cx="62" cy="70" r="10"/>
      <circle cx="62" cy="116" r="10"/>
      <circle cx="62" cy="162" r="10"/>
      <circle cx="62" cy="208" r="10"/>
      <circle cx="62" cy="254" r="10"/>
      <circle cx="62" cy="300" r="10"/>
      <circle cx="62" cy="346" r="10"/>
      <circle cx="62" cy="392" r="10"/>
      <circle cx="62" cy="438" r="10"/>
    </g>
  </g>
  <g filter="url(#shadow)">
    <rect x="112" y="88" width="696" height="352" rx="20" fill="white"/>
    <rect x="112" y="88" width="696" height="236" rx="20" fill="url(#hero)"/>
    <path d="M112 304H808V420C808 431.046 799.046 440 788 440H132C120.954 440 112 431.046 112 420V304Z" fill="white"/>
    <text x="778" y="120" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="30" fill="white" opacity="0.9">×</text>
    <rect x="382" y="144" width="58" height="58" rx="14" fill="white"/>
    <rect x="394" y="156" width="34" height="34" rx="8" fill="#C74336"/>
    <text x="411" y="180" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700" fill="white">R</text>
    <rect x="456" y="169" width="48" height="2" rx="1" fill="white" opacity="0.75"/>
    <rect x="518" y="144" width="58" height="58" rx="14" fill="#111827"/>
    <text x="547" y="181" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700" fill="white">◎</text>
    <text x="460" y="246" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="32" font-weight="700" fill="white">将 read code 添加到 ChatGPT</text>
    <rect x="418" y="290" width="84" height="50" rx="25" fill="white"/>
    <text x="460" y="322" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="20" fill="#111827">连接</text>
    <text x="136" y="354" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700" fill="#111827">始终基于权限。</text>
    <text x="252" y="354" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#6B7280">ChatGPT 将受限于你明确设置的权限。</text>
    <text x="136" y="386" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700" fill="#111827">一个动作需要确认。</text>
    <text x="272" y="386" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#6B7280">ChatGPT 始终需要你确认敏感操作；read code 只暴露只读工具。</text>
    <text x="136" y="418" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700" fill="#111827">连接器可能会引入风险。</text>
    <text x="302" y="418" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#6B7280">请只连接你信任并已授权的仓库目录。</text>
  </g>
</svg>
